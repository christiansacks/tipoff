services:
  tipoff:
    image: meatlotion/tipoff:latest
    container_name: tipoff
    network_mode: host          # required for LAN discovery on Linux
    cap_add:
      - NET_RAW                 # required for ARP scanning
      - NET_ADMIN
    volumes:
      - tipoff_data:/data       # SQLite DB + certs persist here
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TIPOFF_USERNAME=admin      # change before going live
      - TIPOFF_PASSWORD=admin      # change before going live
      #- HTTPS=true                # uncomment to enable HTTPS on port 8443

volumes:
  tipoff_data:
